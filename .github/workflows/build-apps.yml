name: build apps

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * *"

env:
  TZ: Asia/Shanghai 

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: set timezone
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          date +"%Y-%m-%d %H:%M:%S %Z"
          
      - name: system info
        run: |
          date +"%Y-%m-%d %H:%M:%S %Z"
          lscpu | grep -E '^Architecture|^CPU\(s\):|^Model name'
          uname -sr
          lsb_release -a
          free -h
          df -Th

      - name: checkout
        uses: actions/checkout@v4

      - name: build
        uses: apoiston/actions@apps
        with:
          private-key: ${{ secrets.PRIVATE_KEY }}
          public-key: ${{ secrets.PUBLIC_KEY }}
          prepare_setup_sdk: ${{ secrets.PREPARE_SETUP_SDK }}          
          prepare_packages_configure: ${{ secrets.PREPARE_PACKAGES_CONFIGURE }}          
          prepare_apps: ${{ secrets.PREPARE_APPS }}
          gh_token: ${{ secrets.GITHUB_TOKEN }}

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: apps
          path: |
            ./openwrt/*.gz

      - name: prepare
        run: |
          date +"%Y-%m-%d %H:%M:%S %Z"
          git clone --depth=1 --quiet --branch packages https://github.com/apoiston/index.git
          sed -i "s/N\/A/$(date +"%Y-%m-%d %H:%M:%S %Z")/g" index/index.html
          rsync -a --quiet index/*.{html,css,js} public/
          rsync -a --quiet openwrt/snapshot public/
          echo "${{ secrets.PUBLIC_KEY }}" > public/public-key.pem

      - name: deploy pages
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy public --project-name=infinityapps --branch=apps
