name: clean packages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: write
  actions: read

jobs:
  clean:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: clean tags
        run: |
          git fetch --tags
          git tag --sort=creatordate \
          | xargs -I {} bash -c '[ $(git log -1 --format=%ct {} || echo 0) -lt $(date +%s --date="30 days ago") ] && git tag -d {} && git push origin --delete refs/tags/{} || true'

      - name: clean releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          threshold=$(date -d "30 days ago" +%s)
          
          gh release list --json tagName,createdAt \
          | jq -r --argjson threshold "$threshold" '
              .[] | 
              select(
                (.createdAt | fromdateiso8601) < $threshold and
                .tagName != "" and
                .tagName != null
              ) | 
              .tagName
          ' \
          | while IFS= read -r tag; do
              if [ -n "$tag" ]; then
                echo "尝试删除 Release: $tag"
                
                for attempt in {1..3}; do
                  timeout 10s gh release delete "$tag" --yes && {
                    echo "成功删除 Release: $tag"
                    break
                  } || {
                    echo "尝试 $attempt 失败: $tag"
                    if [ $attempt -lt 3 ]; then
                      sleep 2
                      echo "重试 ($attempt/3)..."
                    else
                      echo "删除 Release $tag 失败，已达最大重试次数"
                    fi
                  }
                done
              else
                echo "跳过空标签"
              fi
            done
          
      - name: delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
          