name: build

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai 

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: set timezone
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          date +"%Y-%m-%d %H:%M:%S"
        env:
          TZ: Asia/Shanghai
                    
      - name: system info
        run: |
          date +"%Y-%m-%d %H:%M:%S"
          lscpu | grep -E '^Architecture|^CPU\(s\):|^Model name'
          uname -sr
          lsb_release -a
          free -h

      - name: checkout
        uses: actions/checkout@v4

      - name: build
        uses: apoiston/actions@world
        with:
          config_buildinfo: config/config.buildinfo
          private-key: ${{ secrets.PRIVATE_KEY }}
          public-key: ${{ secrets.PUBLIC_KEY }}
          repo_url: ${{ secrets.DEV_REPO }}
          branch: ${{ secrets.DEV_BRANCH }}
          prepare_packages: ${{ secrets.PREPARE_PACKAGES }}
          prepare_configure: ${{ secrets.PREPARE_CONFIGURE }}
          prepare_world: ${{ secrets.PREPARE_WORLD }}

      - name: prepare
        continue-on-error: true
        run: |
          cp -a openwrt/feeds.buildinfo config/
          git clone -b feeds https://github.com/apoiston/index.git
          sed -i "s/N\/A/$(date +"%Y-%m-%d %H:%M:%S")/g" index/index.html
          mkdir -p public
          cp -a index/*.{html,css,js} public/
          mv openwrt/SNAPSHOT public/

      - name: deploy cf pages
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy public --project-name=infinityfeeds --branch=apps
          
      - name: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add config/feeds.buildinfo
          git commit -m "chore: update buildinfo"
          git push origin main

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            ./openwrt/apps/*
            ./openwrt/apps.tar.gz

      - name: version
        continue-on-error: true
        run: |
          echo "release created at $(date +"%Y-%m-%d %H:%M:%S")" > ./version.md
          echo "- **linux kernel :** $(grep -i '^linux_kernel' ./openwrt/apps/version.txt | cut -d' ' -f2-)" >> ./version.md
          echo "- **gcc version :** $(grep -i '^gcc_version' ./openwrt/apps/version.txt | cut -d' ' -f2-)" >> ./version.md
          echo "- **sha256 :** $(cut -d' ' -f1 ./openwrt/apps/sha256sums.txt)" >> ./version.md
          rm -f openwrt/apps/version.txt

      - name: add tag
        id: add_tag
        run: |
          git config user.name "github actions"
          git config user.email "actions@github.com"
          TAG="$(date '+%y.%m.%d')"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            git push origin --delete "$TAG" || true
          fi
          git tag -d "$TAG" 2>/dev/null || true
          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./openwrt/apps/*
          tag_name: ${{ steps.add_tag.outputs.tag }}
          name: openwrt sdk ${{ steps.add_tag.outputs.tag }}
          body_path: ./version.md
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0            
          